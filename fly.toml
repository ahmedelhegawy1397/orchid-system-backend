# Fly.io Configuration
app = "orchid-dental-backend"
primary_region = "ams"

[build]

[env]
  PORT = "8080"
  NODE_ENV = "production"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = true
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  # WebSocket support - زيادة timeout للاتصالات الطويلة
  [http_service.concurrency]
    type = "connections"
    hard_limit = 250
    soft_limit = 200

  [[http_service.checks]]
    grace_period = "10s"
    interval = "30s"
    method = "GET"
    timeout = "5s"
    path = "/api/docs"

[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 256
